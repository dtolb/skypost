name: BlueSkyTemplates
options:
  bundleIdPrefix: com.dtolb
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug
  xcodeVersion: "26.5"
  generateEmptyDirectories: true

# The single local SPM package that backs every library product.
packages:
  BlueSkyTemplates:
    path: ".."

# Project-wide build settings — applied to every target unless overridden.
settings:
  base:
    SWIFT_VERSION: "6.0"
    # Approachable Concurrency (Swift 6.2): main-actor by default,
    # non-isolated non-sending by default. Per §4.
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_UPCOMING_FEATURE_NONISOLATED_NONSENDING_BY_DEFAULT: YES
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    MARKETING_VERSION: "2.1.0"
    CURRENT_PROJECT_VERSION: "1"
    APS_ENVIRONMENT: development
    # iCloud/CloudKit entitlements require team-managed signing. Keep these
    # settings in XcodeGen so regenerating the project does not fall back to
    # "Sign to Run Locally", which Xcode rejects for iCloud capabilities.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 49LQ789275

targets:
  BlueSkyTemplates:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: BlueSky Templates
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Take a photo to attach to your Bluesky post."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dtolb.BlueSkyTemplates
        PRODUCT_NAME: BlueSkyTemplates
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Entitlements file ships a single keychain-access-group matching
        # this bundle id. Without an entitlements file at all, simulator
        # builds hit errSecMissingEntitlement (-34018) the first time
        # ATProtoKit's AppleSecureKeychain calls SecItemAdd to persist the
        # refresh token. The access group is *not* shared today; when a
        # Share Extension or Widget lands, add their bundle ids to the
        # array in BlueSkyTemplates.entitlements and run the keychain
        # migration (~30 lines: read-old / write-new / delete-old).
        CODE_SIGN_ENTITLEMENTS: BlueSkyTemplates.entitlements
        SWIFT_VERSION: "6.0"
      configs:
        Debug:
          # Device debug builds need a development identity for iCloud,
          # CloudKit, push, and keychain entitlements.
          CODE_SIGN_IDENTITY: Apple Development
          APS_ENVIRONMENT: development
        Release:
          # Keep automatic signing in control for archives. The export step
          # re-signs for TestFlight with Apple Distribution when the runner has
          # the identity or App Store Connect can cloud-sign.
          APS_ENVIRONMENT: production
    dependencies:
      - package: BlueSkyTemplates
        product: BlueSkyTemplatesApp

schemes:
  BlueSkyTemplates:
    build:
      targets:
        BlueSkyTemplates: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
