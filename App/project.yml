name: BlueSkyTemplates
options:
  bundleIdPrefix: com.dtolb
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug
  xcodeVersion: "26.5"
  generateEmptyDirectories: true

# The single local SPM package that backs every library product.
packages:
  BlueSkyTemplates:
    path: ".."

# Project-wide build settings — applied to every target unless overridden.
settings:
  base:
    SWIFT_VERSION: "6.0"
    # Approachable Concurrency (Swift 6.2): main-actor by default,
    # non-isolated non-sending by default. Per §4.
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_UPCOMING_FEATURE_NONISOLATED_NONSENDING_BY_DEFAULT: YES
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    # Ad-hoc signing (`CODE_SIGN_IDENTITY = -`) is enough for simulator
    # builds and headless CI; it requires no certificate or team and
    # ensures the entitlements file is embedded so Keychain works.
    # `CODE_SIGNING_ALLOWED: NO` would skip codesign entirely, which
    # leaves the binary with empty entitlements and breaks SecItemAdd
    # (-34018). Dan can swap to a Team ID in the project UI when building
    # to a device.
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

targets:
  BlueSkyTemplates:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: BlueSky Templates
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "2.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dtolb.BlueSkyTemplates
        PRODUCT_NAME: BlueSkyTemplates
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Re-assert ad-hoc signing at the target level — Xcodegen defaults
        # iOS application targets to `CODE_SIGN_IDENTITY = "iPhone Developer"`,
        # which overrides the project-wide `"-"` and would require a real
        # signing certificate. Pin it back to `-` so simulator and CI builds
        # sign ad-hoc with no team or cert.
        CODE_SIGN_IDENTITY: "-"
        # Entitlements file ships a single keychain-access-group matching
        # this bundle id. Without an entitlements file at all, simulator
        # builds hit errSecMissingEntitlement (-34018) the first time
        # ATProtoKit's AppleSecureKeychain calls SecItemAdd to persist the
        # refresh token. The access group is *not* shared today; when a
        # Share Extension or Widget lands, add their bundle ids to the
        # array in BlueSkyTemplates.entitlements and run the keychain
        # migration (~30 lines: read-old / write-new / delete-old).
        CODE_SIGN_ENTITLEMENTS: BlueSkyTemplates.entitlements
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: BlueSkyTemplates
        product: BlueSkyTemplatesApp

schemes:
  BlueSkyTemplates:
    build:
      targets:
        BlueSkyTemplates: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
