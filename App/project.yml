name: BlueSkyTemplates
options:
  bundleIdPrefix: com.dtolb
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug
  xcodeVersion: "26.5"
  generateEmptyDirectories: true

# The single local SPM package that backs every library product.
packages:
  BlueSkyTemplates:
    path: ".."

# Project-wide build settings — applied to every target unless overridden.
settings:
  base:
    SWIFT_VERSION: "6.0"
    # Approachable Concurrency (Swift 6.2): main-actor by default,
    # non-isolated non-sending by default. Per §4.
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_UPCOMING_FEATURE_NONISOLATED_NONSENDING_BY_DEFAULT: YES
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    # No signing for CI builds — Debug uses ad-hoc, no profile required
    # for simulator. Dan can swap to a Team ID in the project UI when
    # building to a device.
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  BlueSkyTemplates:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
    resources:
      - path: Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: BlueSky Templates
        CFBundleShortVersionString: "2.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dtolb.BlueSkyTemplates
        PRODUCT_NAME: BlueSkyTemplates
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Resources/BlueSkyTemplates.entitlements
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: BlueSkyTemplates
        product: BlueSkyTemplatesApp

schemes:
  BlueSkyTemplates:
    build:
      targets:
        BlueSkyTemplates: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
