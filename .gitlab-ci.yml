---
# JUnit reports come from `swift test --xunit-output` rather than
# `xcodebuild test`: the iOS app target in App/BlueSkyTemplates.xcodeproj
# has no test bundle yet, so all current test coverage is in the SPM library
# targets (Tests/AuthTests, BlueskyTests, ComposeTests, TemplatesTests).
# When an Xcode-level test target lands, add a parallel `xcodebuild test`
# job that emits its own JUnit via xcresultparser.

stages:
  - build
  - test
  - release

variables:
  SCHEME: BlueSkyTemplates
  # iPhone 15 simulator was retired in Xcode 26. iPhone 17 ships as a
  # default. The runner has Xcode 26.5 + a current Simulators package.
  DESTINATION: "platform=iOS Simulator,name=iPhone 17"

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "v2"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

build:
  stage: build
  tags:
    - xcode
  script:
    # The .xcodeproj is .gitignore'd — regenerate it from project.yml.
    # The xcode runner has Homebrew; install xcodegen if it isn't already.
    - command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
    - (cd App && xcodegen generate)
    - |
      xcodebuild build \
        -project App/BlueSkyTemplates.xcodeproj \
        -scheme "$SCHEME" \
        -destination "$DESTINATION" \
        -configuration Debug

test:
  stage: test
  tags:
    - xcode
  script:
    - mkdir -p test-results
    # `swift test --xunit-output FOO.xml` writes FOO-swift-testing.xml
    # (and FOO-xctest.xml when XCTest cases are present). The glob in
    # artifacts.reports.junit below picks up both.
    - swift test --xunit-output test-results/junit.xml
  artifacts:
    when: always
    paths:
      - test-results/
    reports:
      junit: test-results/junit-*.xml
    expire_in: 1 week

release-check:
  stage: release
  tags:
    - xcode
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  script:
    - command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
    - chmod +x scripts/release-testflight.sh
    # Branch pipelines exercise the Release archive path without signing or
    # uploading. The real TestFlight job below gets its marketing version from
    # the release tag.
    - BUILD_NUMBER="${CI_PIPELINE_IID:-1}" scripts/release-testflight.sh --unsigned-archive --skip-export 0.0.0
  artifacts:
    when: always
    paths:
      - dist/release-info.txt
    expire_in: 1 week

release-testflight:
  stage: release
  tags:
    - xcode
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
  variables:
    GIT_DEPTH: "0"
  resource_group: testflight
  before_script:
    # Same unattended signing keychain setup used by the macOS release job.
    # The keychain must contain an Apple Distribution identity for local iOS
    # distribution signing; otherwise Xcode falls back to App Store Connect
    # cloud signing during archive/export.
    - security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
    - 'security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true'
  script:
    - command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
    - chmod +x scripts/release-testflight.sh
    - scripts/release-testflight.sh "${CI_COMMIT_TAG#v}"
  artifacts:
    when: always
    paths:
      - dist/release-info.txt
    expire_in: 30 days
