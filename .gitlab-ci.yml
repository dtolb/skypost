# CI_TODO (handoff for next agent):
#   1. The `xcode` tag runner exists on the tolbbox Mac (see ~/.claude/
#      skills/gitlab-runners-tolbbox/SKILL.md) but full Xcode.app is NOT
#      installed yet — only Command Line Tools. The `test` job below
#      needs the iOS Simulator, which requires Xcode.app.
#      Once Xcode.app is installed + `sudo xcode-select -s
#      /Applications/Xcode.app` is run:
#        - remove `when: manual` from the `test` job rule
#        - remove `allow_failure: true`
#   2. Verify the Xcode scheme name. This config assumes a shared scheme
#      named "BlueSkyTemplates". Run `xcodebuild -list -project ...`
#      and update SCHEME below if it differs.
#   3. Install xcresultparser on the xcode runner once:
#      `brew install a7ex/homebrew-formulae/xcresultparser`.

stages:
  - test

variables:
  XCODE_PROJECT_DIR: BlueSkyTemplates/BlueSkyTemplates
  XCODE_PROJECT: BlueSkyTemplates.xcodeproj
  SCHEME: BlueSkyTemplates
  DESTINATION: "platform=iOS Simulator,name=iPhone 15"

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

test:
  stage: test
  tags:
    - xcode
  allow_failure: true
  rules:
    - when: manual
  script:
    - cd "$XCODE_PROJECT_DIR"
    - mkdir -p ../../test-results
    - |
      xcodebuild test \
        -project "$XCODE_PROJECT" \
        -scheme "$SCHEME" \
        -destination "$DESTINATION" \
        -resultBundlePath ../../test-results/result.xcresult \
        -enableCodeCoverage NO
    - cd ../..
    - xcresultparser --output-format junit test-results/result.xcresult > test-results/junit.xml
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - test-results/junit.xml
      - test-results/result.xcresult
    reports:
      junit: test-results/junit.xml
